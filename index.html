<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="main.svg" />
  <link rel="apple-touch-icon" href="main.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffa3a5" />
  <title>FlexiPayroll - Payroll Management System</title>
  <meta name="description" content="A lightweight, browser-based payroll management system for SMEs. Track attendance, calculate salaries, and generate reports - all in your browser." />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="FlexiPayroll - Payroll Management System" />
  <meta property="og:description" content="A lightweight, browser-based payroll management system for SMEs. Track attendance, calculate salaries, and generate reports - all in your browser." />
  <meta property="og:image" content="logo.svg" />
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FlexiPayroll - Payroll Management System" />
  <meta name="twitter:description" content="A lightweight, browser-based payroll management system for SMEs. Track attendance, calculate salaries, and generate reports - all in your browser." />
  <meta name="twitter:image" content="logo.svg" />
</head>

<body>
  <div id="app"></div>
  <script type="module">
    import platformCompatScreen from "platform-compat-screen"
    platformCompatScreen({
      mode: "block",
      target: "mobile",
      message: "This application requires a desktop device.",
    })
    navigator.serviceWorker?.getRegistrations().then((rs) => rs.map((r) => r.unregister()))
    caches?.keys().then((keys) => keys.map((k) => caches.delete(k)))
    import("/src/main.js")
  </script>
</body>

</html>
